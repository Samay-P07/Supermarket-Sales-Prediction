<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="{{ url_for('static', filename='logo.jpeg') }}">
    <title>Super Market Sales Prediction Result</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-image: linear-gradient(60deg, rgba(2,0,36,1) 0%, rgba(171,184,189,1) 56%, rgba(0,232,255,1) 100%);
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 50vh;
        }
        .box {
            background-color: #f0f0f0;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0px 0px 10px 2px #ccc;
            text-align: center;
        }
        .result {
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    
    <h1>Super Market Sales Prediction Result</h1>
    <div style="height: 20em; width: 100%; background-image: url(/static/market.gif)">
    </div>
    <div class="container">
        <div class="box">
            <p class="result">Prediction Result: {{ prediction }}</p>
            <a href="/start" style="text-decoration: none; color: #007BFF;">Go back to the prediction form</a>
        </div>
    </div>
    <!-- <div style="background-image: linear-gradient(#845EC2,#B39CD0,#FBEAFF,#00C9A7);">
		<div id="page" class="container" style="background-color: #00CCCC;padding-top: 2%;"> -->
    <iframe src="https://www.starquik.com/" title="Supermarkets near you" width="75%" height="500">
    </iframe>
        </div></div>
</body>
</html>
